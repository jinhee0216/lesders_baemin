<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>배달앱 매출 월별 합계 계산기</title>
  <style>
    :root {
      --bg-1: #e4ecff;
      --bg-2: #f1f6ff;
      --card: rgba(247, 250, 255, 0.92);
      --line: #c7d5ff;
      --title: #0e2454;
      --text: #40527f;
      --badge-bg: #dde6ff;
      --badge-text: #3048c9;
      --info-bg: #e7eeff;
      --info-text: #334a9f;
      --error-bg: #ffe8ee;
      --error-text: #c0264f;
      --success-bg: #e7f7ff;
      --success-text: #0f4f8a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
      background: radial-gradient(circle at 10% 10%, var(--bg-1), var(--bg-2) 55%);
      color: var(--text);
      padding: 24px;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      display: grid;
      gap: 14px;
    }

    .page-title-wrap {
      text-align: center;
      padding: 14px 16px;
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(223, 233, 255, 0.7), rgba(239, 245, 255, 0.8));
      border: 1px solid #c8d7ff;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.75);
      margin-bottom: 2px;
    }

    .page-title-kicker {
      display: inline-block;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 700;
      color: #3b56a9;
      border-radius: 999px;
      background: #edf2ff;
      border: 1px solid #d3defe;
      margin-bottom: 6px;
    }

    .page-title {
      margin: 0;
      text-align: center;
      font-size: 30px;
      font-weight: 900;
      color: #1d3f96;
      letter-spacing: -0.4px;
      line-height: 1.1;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(8px);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 20px 20px 18px;
      box-shadow: 0 10px 24px rgba(40, 65, 145, 0.12);
    }

    .badge-row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; justify-content: center; }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .yogiyo-logo {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      background: #ff004f;
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: -0.2px;
      box-shadow: 0 4px 10px rgba(255, 0, 79, 0.25);
      flex: 0 0 auto;
    }


    .baemin-logo {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      background: linear-gradient(145deg, #2ec8c8, #27b6bf);
      color: #ffffff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: -0.3px;
      box-shadow: 0 6px 14px rgba(25, 132, 160, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.55);
      flex: 0 0 auto;
    }
    .badge {
      background: var(--badge-bg);
      color: var(--badge-text);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid #d9d8ff;
      letter-spacing: 0.1px;
    }

    h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.2;
      color: var(--title);
      letter-spacing: -0.3px;
    }

    .hint {
      margin: 6px 0 0;
      font-size: 16px;
      color: #5d6d99;
      text-align: center;
    }

    .upload {
      margin-top: 8px;
      padding: 10px 12px;
      border: 1px dashed #b9c9ff;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      background: rgba(245, 248, 255, 0.8);
    }

    input[type="file"] {
      background: #fff;
      border: 1px solid #b8c5f1;
      border-radius: 11px;
      padding: 6px;
      font-size: 14px;
      color: var(--title);
    }

    .filename {
      font-size: 14px;
      color: var(--title);
      font-weight: 700;
    }

    .message {
      margin-top: 8px;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid transparent;
      text-align: center;
    }
    .message.info { background: var(--info-bg); color: var(--info-text); border-color: #d8e1ff; }
    .message.error { background: var(--error-bg); color: var(--error-text); border-color: #ffd1db; }

    .result-head {
      margin-top: 8px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .section-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--title);
    }

    .biz-meta {
      font-size: 13px;
      color: #435488;
      background: #edf2ff;
      border: 1px solid #d7e0ff;
      border-radius: 999px;
      padding: 5px 10px;
      white-space: nowrap;
    }

    .table-wrap {
      margin-top: 8px;
      border: 1px solid #d7dff8;
      border-radius: 10px;
      overflow-x: auto;
      background: #fff;
    }

    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td {
      padding: 8px 10px;
      border-top: 1px solid #edf1ff;
      color: #22335f;
      text-align: center;
    }
    tr:first-child th, tr:first-child td { border-top: 0; }

    th.row-label {
      background: #eef2ff;
      color: var(--title);
      font-weight: 800;
      width: 68px;
      position: sticky;
      left: 0;
      z-index: 1;
    }

    td.amount-cell { font-variant-numeric: tabular-nums; font-weight: 800; }

    .total {
      margin-top: 8px;
      border-radius: 10px;
      background: var(--success-bg);
      border: 1px solid #bdeedc;
      color: var(--success-text);
      padding: 10px 12px;
      font-size: 16px;
      font-weight: 900;
    }

    @media (max-width: 1024px) {
      h1 { font-size: 24px; }
      .hint, .filename, .message, .section-title { font-size: 14px; }
      table { font-size: 13px; }
      .total { font-size: 15px; }
      input[type="file"] { font-size: 14px; }
      .biz-meta { font-size: 13px; }
      .yogiyo-logo { width: 34px; height: 34px; font-size: 10px; border-radius: 7px; }
      .baemin-logo { width: 34px; height: 34px; font-size: 10px; border-radius: 8px; }
      .page-title { font-size: 22px; }
      .page-title-kicker { font-size: 10px; padding: 3px 8px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="page-title-wrap"><div class="page-title-kicker">2026_매출계산기</div><h2 class="page-title">리더스론_지니위키</h2></div>
    <section class="card" id="baemin-card">
      <div class="badge-row">
        <span class="badge">월별 자동 집계</span>
      </div>
      <div class="title-row"><span class="baemin-logo">배민</span><h1>배달의민족 매출 계산</h1></div>
      <p class="hint">암호를 해제한 엑셀 파일을 업로드해주세요. </p>
      <div class="upload">
        <input id="baemin-file" type="file" accept=".xlsx,.xls" />
        <span id="baemin-name" class="filename">선택된 파일 없음</span>
      </div>
      <div id="baemin-output">
        <div class="message info">파일을 업로드하면 월별 합계 금액이 표시됩니다.</div>
      </div>
    </section>

    <section class="card" id="yogiyo-card">
      <div class="badge-row">
        <span class="badge">월별 자동 집계</span>
      </div>
      <div class="title-row"><span class="yogiyo-logo">요기요</span><h1>요기요 매출 계산</h1></div>
      <p class="hint">암호를 해제한 엑셀 파일을 업로드해주세요. </p>
      <div class="upload">
        <input id="yogiyo-file" type="file" accept=".xlsx,.xls" />
        <span id="yogiyo-name" class="filename">선택된 파일 없음</span>
      </div>
      <div id="yogiyo-output">
        <div class="message info">파일을 업로드하면 월별 합계 금액이 표시됩니다.</div>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script>
    function excelDateToJSDate(serial) {
      const utcDays = Math.floor(serial - 25569);
      const utcValue = utcDays * 86400;
      return new Date(utcValue * 1000);
    }

    function toDate(value) {
      if (value == null || value === '') return null;
      if (value instanceof Date && !isNaN(value)) return value;
      if (typeof value === 'number') {
        const d = excelDateToJSDate(value);
        return isNaN(d) ? null : d;
      }
      const d = new Date(value);
      return isNaN(d) ? null : d;
    }

    function toMonthKey(date) {
      const year = date.getUTCFullYear();
      const month = String(date.getUTCMonth() + 1).padStart(2, '0');
      return `${year}-${month}`;
    }

    function formatWithoutLastThree(value) {
      return Math.floor(value / 1000).toLocaleString();
    }

    function getCell(rows, rowIndex, colIndex) {
      return rows[rowIndex] && rows[rowIndex][colIndex] != null && rows[rowIndex][colIndex] !== ''
        ? String(rows[rowIndex][colIndex]).trim()
        : '-';
    }

    function bindCalculator({
      fileId,
      nameId,
      outputId,
      dateCol,
      amountCol,
      startRow,
      invalidMsg,
      bizNoCell,
      bizNameCell
    }) {
      const fileInput = document.getElementById(fileId);
      const fileName = document.getElementById(nameId);
      const output = document.getElementById(outputId);

      fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        fileName.textContent = file.name;

        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, { type: 'array', cellDates: true });
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(firstSheet, { header: 1, raw: true });

            const bizNo = getCell(rows, bizNoCell.row, bizNoCell.col);
            const bizName = getCell(rows, bizNameCell.row, bizNameCell.col);

            const monthlySums = new Map();
            for (let i = startRow; i < rows.length; i++) {
              const row = rows[i];
              const date = toDate(row[dateCol]);
              const amount = Number(row[amountCol]);
              if (!date || Number.isNaN(amount)) continue;

              const monthKey = toMonthKey(date);
              monthlySums.set(monthKey, (monthlySums.get(monthKey) || 0) + amount);
            }

            const entries = Array.from(monthlySums.entries()).sort((a, b) => a[0].localeCompare(b[0]));
            if (entries.length === 0) {
              output.innerHTML = `<div class="message error">${invalidMsg}</div>`;
              return;
            }

            let total = 0;
            const monthCells = entries.map(([month]) => `<td>${month}</td>`).join('');
            const amountCells = entries.map(([, sum]) => {
              total += sum;
              return `<td class="amount-cell">${formatWithoutLastThree(sum)}</td>`;
            }).join('');

            output.innerHTML = `
              <div class="result-head">
                <div class="section-title">월별 합계 결과</div>
                <div class="biz-meta">사업자번호: ${bizNo} | 상호명: ${bizName}</div>
              </div>
              <div class="table-wrap">
                <table>
                  <tbody>
                    <tr><th class="row-label">월</th>${monthCells}</tr>
                    <tr><th class="row-label">금액</th>${amountCells}</tr>
                  </tbody>
                </table>
              </div>
              <div class="total">전체 합계: ${formatWithoutLastThree(total)}</div>
            `;
          } catch (err) {
            output.innerHTML = `<div class="message error">처리 중 오류: ${err.message}</div>`;
          }
        };
        reader.readAsArrayBuffer(file);
      });
    }

    bindCalculator({
      fileId: 'baemin-file',
      nameId: 'baemin-name',
      outputId: 'baemin-output',
      dateCol: 0,
      amountCol: 6,
      startRow: 0,
      invalidMsg: '유효한 데이터가 없습니다. A열 날짜 / G열 금액 형식을 확인해주세요.',
      bizNoCell: { row: 9, col: 1 },
      bizNameCell: { row: 7, col: 1 }
    });

    bindCalculator({
      fileId: 'yogiyo-file',
      nameId: 'yogiyo-name',
      outputId: 'yogiyo-output',
      dateCol: 0,
      amountCol: 5,
      startRow: 21,
      invalidMsg: '유효한 데이터가 없습니다. A22 날짜 / F22 금액 형식을 확인해주세요.',
      bizNoCell: { row: 15, col: 1 }, // B16
      bizNameCell: { row: 22, col: 1 }
    });
  </script>
</body>
</html>
